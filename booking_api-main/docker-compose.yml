version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: booking_db_container
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_password
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

volumes:
  db_data: